<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProZone Realty — Project Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231a1a2e'/><text y='22' x='6' font-size='18'>🏢</text></svg>"/>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-logo">PZ</div>
        <div class="brand-text">
          <span class="brand-name">ProZone Realty</span>
          <span class="brand-tag">Project Command Center</span>
        </div>
      </div>
      <div class="header-right">
        <div class="live-dot-wrap"><span class="live-dot"></span><span class="live-label">Live</span></div>
        <button class="btn-add" onclick="openModal()">+ Add Update</button>
      </div>
    </div>
  </header>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-pill" id="stat-total"><span class="stat-num" id="count-total">0</span><span class="stat-lbl">Total Projects</span></div>
    <div class="stat-pill on-track"><span class="stat-num" id="count-ontrack">0</span><span class="stat-lbl">On Track</span></div>
    <div class="stat-pill delayed"><span class="stat-num" id="count-delayed">0</span><span class="stat-lbl">Delayed</span></div>
    <div class="stat-pill completed"><span class="stat-num" id="count-completed">0</span><span class="stat-lbl">Completed</span></div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all" onclick="filterCards('all', this)">All</button>
    <button class="filter-btn" data-filter="On Track" onclick="filterCards('On Track', this)">🟢 On Track</button>
    <button class="filter-btn" data-filter="Delayed" onclick="filterCards('Delayed', this)">🔴 Delayed</button>
    <button class="filter-btn" data-filter="Completed" onclick="filterCards('Completed', this)">🔵 Completed</button>
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Search projects…" oninput="searchCards(this.value)" />
    </div>
  </div>

  <!-- PROJECT GRID -->
  <main class="main-content">
    <div class="grid" id="projects-grid">
      <!-- Cards injected by JS -->
    </div>
    <div class="empty-state" id="empty-state" style="display:none;">
      <div class="empty-icon">📋</div>
      <p>No projects found.</p>
      <span>Try a different filter or add a new update.</span>
    </div>
  </main>

  <!-- ACTIVITY LOG SIDEBAR (desktop) -->
  <aside class="activity-sidebar" id="activity-sidebar">
    <div class="sidebar-header">
      <h3>Activity Log</h3>
      <span id="activity-count" class="badge">0</span>
    </div>
    <ul class="activity-list" id="activity-list">
      <li class="activity-empty">No activity yet</li>
    </ul>
  </aside>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-header">
        <h2>Post a Project Update</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <form id="update-form" onsubmit="submitUpdate(event)">
        <div class="form-group">
          <label>Project Name</label>
          <select id="f-project" required>
            <option value="">— Select a project —</option>
            <option>Bandra Residences</option>
            <option>Worli Skyline</option>
            <option>Andheri Heights</option>
            <option>Juhu Marina</option>
            <option>Powai Greens</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <div class="status-options">
            <label class="status-radio on-track-radio">
              <input type="radio" name="status" value="On Track" required /> On Track
            </label>
            <label class="status-radio delayed-radio">
              <input type="radio" name="status" value="Delayed" /> Delayed
            </label>
            <label class="status-radio completed-radio">
              <input type="radio" name="status" value="Completed" /> Completed
            </label>
          </div>
        </div>
        <div class="form-group">
          <label>Update / Note</label>
          <textarea id="f-update" rows="3" placeholder="e.g. Foundation work completed. Moving to structure phase next week." required maxlength="300"></textarea>
          <span class="char-count" id="char-count">0 / 300</span>
        </div>
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="f-name" placeholder="e.g. Rahul Sharma" required maxlength="60" />
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-submit" id="submit-btn">Post Update</button>
        </div>
      </form>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- SCRIPTS -->
  <script src="firebase.js"></script>
  <script src="app.js"></script>
</body>
</html>
